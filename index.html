<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --blue: #3b5bdb; --blue-light: #4c6ef5; --green: #40c057; --green-light: #51cf66;
    --cyan: #22d3ee; --bg: #080a0f; --bg2: #0d1117; --card: #0f1318; --card2: #111620;
    --border: rgba(255,255,255,0.07); --text: #ffffff; --muted: #8a9ab5;
    --icon-bg: rgba(59, 91, 219, 0.3);
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
  .stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 40px; background: rgba(8,10,15,0.85); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);

  .nav-logo {
    width: 36px; height: 36px;
    background: transparent;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .nav-logo img { width: 100%; height: 100%; object-fit: contain; }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a { color: #ccd6f6; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: #fff; }
  .btn-primary { background: var(--blue); color: #fff; border: none; border-radius: 999px; padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: background 0.2s; }
  .btn-primary:hover { background: var(--blue-light); }
  section { position: relative; z-index: 1; }
  #home { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 20px 80px; }
  .hero-logo { width: 130px; height: 130px; display: flex; align-items: center; justify-content: center; margin-bottom: 40px; animation: float 4s ease-in-out infinite; }
  .hero-logo .logo-image { width: 100px; height: auto; border-radius: 8px; }
  @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
  .welcome-label { letter-spacing: 4px; font-size: 11px; color: var(--green); font-weight: 600; margin-bottom: 16px; text-transform: uppercase; }
  .hero-title { font-size: clamp(52px, 8vw, 88px); font-weight: 800; line-height: 1.1; margin-bottom: 8px; }
  .hero-title .gradient-text { background: linear-gradient(90deg, #3b82f6, #22d3ee, #40c057); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero-subtitle { font-size: 16px; color: var(--muted); max-width: 420px; margin: 20px auto 36px; line-height: 1.6; }
  .hero-buttons { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn-outline { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 999px; padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: border-color 0.2s, background 0.2s; }
  .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.05); }
  .scroll-hint { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{ transform: translateX(-50%) translateY(0); } 50%{ transform: translateX(-50%) translateY(6px); } }

  .featured-cards { display: flex; gap: 20px; flex-wrap: wrap; }

  .about-link { color: var(--blue-light); text-decoration: none; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; }
  .about-link:hover { text-decoration: underline; }
  .about-img-wrap { position: relative; }

  .about-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .about-badge-date { color: var(--green); font-size: 16px; font-weight: 800; margin-bottom: 2px; }
  .about-badge-label { color: var(--muted); font-size: 11px; }
  .values-section { padding: 90px 60px; border-bottom: 1px solid var(--border); }
  .values-section .section-label { text-align: center; margin-bottom: 12px; }
  .values-section .section-title { text-align: center; font-size: 40px; margin-bottom: 48px; }
  .values-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
  .value-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }

  .value-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .timeline-section { padding: 90px 60px; border-bottom: 1px solid var(--border); }

  .timeline { position: relative; max-width: 700px; margin: 0 auto; }

  .timeline-item { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 48px; position: relative; }
  .timeline-dot { position: absolute; left: 50%; top: 10px; width: 10px; height: 10px; background: var(--blue); border-radius: 50%; transform: translateX(-50%); z-index: 2; }

  .timeline-right { text-align: left; padding-left: 20px; }

  .timeline-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .timeline-text { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .mission-quote .m-green { color: var(--green); }
  .mission-quote .m-blue { color: #3b82f6; }

  .games-title { font-size: 52px; font-weight: 800; margin-bottom: 14px; }
  .games-title .hl-green { color: var(--green); }
  .games-subtitle { font-size: 15px; color: var(--muted); max-width: 500px; margin: 0 auto; }

  .filter-btn { background: transparent; border: none; color: var(--muted); font-size: 13px; font-weight: 500; padding: 5px 14px; border-radius: 999px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .filter-btn.active { background: var(--green); color: #fff; }

  .game-card-full { background: var(--card2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }

  .game-card-full .game-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .game-card-full .game-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
  .game-meta { display: flex; justify-content: space-between; align-items: center; }
  .game-date { font-size: 12px; color: var(--muted); }
  .game-details-link { color: var(--blue-light); font-size: 12px; text-decoration: none; }
  .no-results { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; display: none; }

  #services { padding: 100px 60px 80px; min-height: 100vh; border-top: 1px solid var(--border); }

  .services-title { font-size: 52px; font-weight: 800; margin-bottom: 14px; }
  .services-title .hl-blue { color: #3b82f6; }
  .services-subtitle { font-size: 15px; color: var(--muted); max-width: 500px; margin: 0 auto; }
  .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1100px; margin: 0 auto 60px; }
  .service-card { background: var(--card2); border: 1px solid var(--border); border-radius: 14px; padding: 28px; display: flex; gap: 18px; align-items: flex-start; }
  .service-icon { width: 44px; height: 44px; min-width: 44px; background: var(--icon-bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; }

  .service-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }

  .process-steps::before { content: ''; position: absolute; top: 28px; left: 14%; right: 14%; height: 1px; background: rgba(59,91,219,0.3); }

  .cta-text { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 400px; margin: 0 auto 28px; }
